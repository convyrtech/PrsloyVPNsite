<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRSLOY · Global Network · Dot Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --black: #000;
      --surface: #111;
      --border: #222;
      --border-visible: #333;
      --text-disabled: #666;
      --text-secondary: #999;
      --text-primary: #e8e8e8;
      --text-display: #fff;
      --accent: #d71921;
      --success: #4a9e5c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text-primary);
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: grab;
    }
    .stage.dragging { cursor: grabbing; }

    canvas#globe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
    }
    .overlay > * { pointer-events: auto; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .label {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-disabled);
    }
    .title-block .label { margin-bottom: 12px; }
    .title-block h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text-display);
    }
    .title-block h1 strong { font-weight: 500; }
    .title-block .subtitle {
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 12px;
      max-width: 320px;
      line-height: 1.5;
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 32px;
    }
    .metric .label { margin-bottom: 4px; }
    .metric .value {
      font-family: "Space Mono", monospace;
      font-size: 22px;
      font-weight: 400;
      color: var(--text-display);
      letter-spacing: -0.02em;
    }
    .metric .value .unit {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: 4px;
    }
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .legend {
      display: flex;
      gap: 24px;
      align-items: center;
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot-origin {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid var(--text-display);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
    }
    .dot-exit {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-display);
    }
    .dot-active {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(215, 25, 33, 0.6);
    }
    .signature {
      font-family: "Doto", monospace;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: var(--text-display);
      opacity: 0.7;
    }
    .hint {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-disabled);
      animation: pulse 2s ease-in-out infinite;
      z-index: 9;
      pointer-events: none;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.85; } }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-disabled);
      z-index: 5;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Hover tooltip for destinations */
    .node-tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, calc(-100% - 16px));
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border-visible);
      border-radius: 8px;
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-primary);
      opacity: 0;
      transition: opacity 180ms ease-out, transform 180ms ease-out;
      min-width: 180px;
      will-change: opacity, transform;
    }
    .node-tooltip.visible {
      opacity: 1;
      transform: translate(-50%, calc(-100% - 22px));
    }
    .node-tooltip .tt-name {
      color: var(--text-display);
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .node-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .node-tooltip .tt-row .tt-val { color: var(--text-display); }
    .node-tooltip .tt-row .tt-val.online {
      color: var(--success);
    }
    .node-tooltip::after {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background: var(--surface);
      border-right: 1px solid var(--border-visible);
      border-bottom: 1px solid var(--border-visible);
    }

    @media (max-width: 768px) {
      .overlay { padding: 24px; }
      .metrics { grid-template-columns: 1fr; gap: 12px; }
      .top-bar { flex-direction: column; gap: 32px; }
      .title-block h1 { font-size: 28px; }
      .legend { gap: 12px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas id="globe"></canvas>

    <div class="loading" id="loading">[ BUILDING GLOBE ]</div>

    <div class="overlay">
      <div class="top-bar">
        <div class="title-block">
          <div class="label">GLOBAL INFRASTRUCTURE</div>
          <h1>Live network.<br /><strong>Real routes. Real time.</strong></h1>
          <p class="subtitle">
            Every connection routed through whitelisted entry, hopped to global exit nodes.
          </p>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="label">NODES</div>
            <div class="value">12</div>
          </div>
          <div class="metric">
            <div class="label">REGIONS</div>
            <div class="value">7</div>
          </div>
          <div class="metric">
            <div class="label">UPTIME</div>
            <div class="value">99.7<span class="unit">%</span></div>
          </div>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="legend">
          <div class="legend-item"><span class="dot-origin"></span>ENTRY</div>
          <div class="legend-item"><span class="dot-exit"></span>EXIT NODE</div>
          <div class="legend-item"><span class="dot-active"></span>ACTIVE PACKET</div>
        </div>
        <div class="signature">PRSLOY</div>
      </div>
    </div>

    <div class="hint">DRAG TO ROTATE · HOVER NODES</div>

    <div class="node-tooltip" id="tooltip">
      <div class="tt-name" id="tt-name">—</div>
      <div class="tt-row"><span>LATENCY</span><span class="tt-val" id="tt-lat">—</span></div>
      <div class="tt-row"><span>UPTIME</span><span class="tt-val" id="tt-up">—</span></div>
      <div class="tt-row"><span>STATUS</span><span class="tt-val online" id="tt-st">ONLINE</span></div>
    </div>
  </div>

  <!-- Geo data only -->
  <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    /* ─────────────────────────────────────────────
       SANITY
       ───────────────────────────────────────────── */
    const loadingEl = document.getElementById("loading");
    if (typeof THREE === "undefined") {
      loadingEl.textContent = "[ ERROR: THREE.JS NOT LOADED ]";
      loadingEl.style.color = "#d71921";
      throw new Error("Three.js missing");
    }
    if (typeof am5geodata_worldLow === "undefined") {
      loadingEl.textContent = "[ ERROR: GEODATA NOT LOADED ]";
      loadingEl.style.color = "#d71921";
      throw new Error("geodata missing");
    }

    /* ─────────────────────────────────────────────
       SCENE SETUP
       ───────────────────────────────────────────── */
    const canvas = document.getElementById("globe");
    const stage = document.getElementById("stage");

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(
      35,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 280;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: true,
      antialias: true,
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    /* ─────────────────────────────────────────────
       GLOBE GROUP — rotates as one
       ───────────────────────────────────────────── */
    const RADIUS = 80;
    const globe = new THREE.Group();
    // Initial rotation set after we know lat/lng utility — see setInitialOrientation()
    scene.add(globe);

    // OPAQUE black sphere — writes depth, hides back-hemisphere dots/wires
    // (Without this the globe behaves like an X-ray and points flicker on rotation)
    const baseGeo = new THREE.SphereGeometry(RADIUS - 0.3, 64, 64);
    const baseMat = new THREE.MeshBasicMaterial({
      color: 0x000000,
    });
    const baseSphere = new THREE.Mesh(baseGeo, baseMat);
    globe.add(baseSphere);

    // Very faint grid wireframe — barely there for context
    const wireGeo = new THREE.SphereGeometry(RADIUS - 0.2, 28, 14);
    const wireMat = new THREE.LineBasicMaterial({
      color: 0x1a1a1a,
      transparent: true,
      opacity: 0.5,
    });
    const wireframe = new THREE.LineSegments(
      new THREE.WireframeGeometry(wireGeo),
      wireMat
    );
    globe.add(wireframe);

    /* ─────────────────────────────────────────────
       LAT/LNG → 3D
       ───────────────────────────────────────────── */
    function latLngToVec3(lat, lng, r = RADIUS) {
      const phi = ((90 - lat) * Math.PI) / 180;
      const theta = ((lng + 180) * Math.PI) / 180;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }

    /* ─────────────────────────────────────────────
       POINT-IN-POLYGON (in lat/lng space)
       ───────────────────────────────────────────── */
    function pointInRing(lng, lat, ring) {
      let inside = false;
      const n = ring.length;
      for (let i = 0, j = n - 1; i < n; j = i++) {
        const lngI = ring[i][0], latI = ring[i][1];
        const lngJ = ring[j][0], latJ = ring[j][1];
        if (
          ((latI > lat) !== (latJ > lat)) &&
          (lng < ((lngJ - lngI) * (lat - latI)) / (latJ - latI || 1e-9) + lngI)
        ) {
          inside = !inside;
        }
      }
      return inside;
    }

    /* Build polygons with bbox for fast skip */
    let landPolys = []; // { ring, bbox: [minLng, minLat, maxLng, maxLat], isRu }
    function buildLandPolygons() {
      landPolys = [];
      for (const feature of am5geodata_worldLow.features) {
        const g = feature.geometry;
        if (!g) continue;
        const id = (feature.properties && feature.properties.id) || feature.id;
        const isRu = id === "RU";

        const polysToAdd =
          g.type === "Polygon" ? [g.coordinates] :
          g.type === "MultiPolygon" ? g.coordinates : [];

        for (const poly of polysToAdd) {
          const outer = poly[0];
          if (!outer || outer.length < 3) continue;

          let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
          for (const [lng, lat] of outer) {
            if (lng < minLng) minLng = lng;
            if (lat < minLat) minLat = lat;
            if (lng > maxLng) maxLng = lng;
            if (lat > maxLat) maxLat = lat;
          }
          landPolys.push({
            ring: outer,
            bbox: [minLng, minLat, maxLng, maxLat],
            isRu,
          });
        }
      }
    }

    function getLandFlag(lng, lat) {
      // returns 0 = not land, 1 = land non-RU, 2 = land RU
      let isLand = false;
      let isRu = false;
      for (const p of landPolys) {
        const b = p.bbox;
        if (lng < b[0] || lng > b[2] || lat < b[1] || lat > b[3]) continue;
        if (pointInRing(lng, lat, p.ring)) {
          isLand = true;
          if (p.isRu) {
            isRu = true;
            break;
          }
        }
      }
      return isRu ? 2 : isLand ? 1 : 0;
    }

    /* ─────────────────────────────────────────────
       BUILD LAND DOTS ON SPHERE
       ───────────────────────────────────────────── */
    function buildDots() {
      const STEP = 1.5; // degrees
      const positionsLand = [];
      const positionsRu = [];

      for (let lat = -85; lat <= 85; lat += STEP) {
        // Adjust longitude step by latitude for more even sphere distribution
        const lngStep = STEP / Math.max(0.15, Math.cos((lat * Math.PI) / 180));

        for (let lng = -180; lng <= 180; lng += lngStep) {
          const flag = getLandFlag(lng, lat);
          if (flag === 0) continue;
          const v = latLngToVec3(lat, lng, RADIUS + 0.3);
          if (flag === 2) {
            positionsRu.push(v.x, v.y, v.z);
          } else {
            positionsLand.push(v.x, v.y, v.z);
          }
        }
      }

      // Land dots (non-RU)
      const landGeo = new THREE.BufferGeometry();
      landGeo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(positionsLand, 3)
      );
      const landMat = new THREE.PointsMaterial({
        color: 0x999999,
        size: 0.7,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85,
        depthWrite: false,
      });
      const landDots = new THREE.Points(landGeo, landMat);
      globe.add(landDots);

      // RU dots
      const ruGeo = new THREE.BufferGeometry();
      ruGeo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(positionsRu, 3)
      );
      const ruMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.85,
        sizeAttenuation: true,
        transparent: true,
        opacity: 1,
        depthWrite: false,
      });
      const ruDots = new THREE.Points(ruGeo, ruMat);
      globe.add(ruDots);

      console.log(`[PRSLOY] dots: ${positionsLand.length / 3} world + ${positionsRu.length / 3} RU`);
    }

    /* ─────────────────────────────────────────────
       ROUTES + MARKERS
       ───────────────────────────────────────────── */
    const ORIGIN = { id: "MSK", name: "MOSCOW", lat: 55.7558, lng: 37.6176 };
    const DESTINATIONS = [
      { id: "AMS", name: "AMSTERDAM",  lat: 52.3676, lng: 4.9041,    latencyMs: 24, uptime: 99.8 },
      { id: "FRA", name: "FRANKFURT",  lat: 50.1109, lng: 8.6821,    latencyMs: 28, uptime: 99.9 },
      { id: "LON", name: "LONDON",     lat: 51.5074, lng: -0.1278,   latencyMs: 36, uptime: 99.7 },
      { id: "NYC", name: "NEW YORK",   lat: 40.7128, lng: -74.006,   latencyMs: 92, uptime: 99.5 },
      { id: "TYO", name: "TOKYO",      lat: 35.6762, lng: 139.6503,  latencyMs: 124, uptime: 99.6 },
      { id: "SIN", name: "SINGAPORE",  lat: 1.3521,  lng: 103.8198,  latencyMs: 138, uptime: 99.4 },
      { id: "SAO", name: "SAO PAULO",  lat: -23.5505, lng: -46.6333, latencyMs: 168, uptime: 99.3 },
    ];

    /* SLERP for great-circle arc */
    function slerp(v1, v2, t) {
      const cosOmega = Math.max(-1, Math.min(1, v1.clone().normalize().dot(v2.clone().normalize())));
      const omega = Math.acos(cosOmega);
      const sinOmega = Math.sin(omega);
      if (sinOmega < 1e-6) return v1.clone();
      const a = Math.sin((1 - t) * omega) / sinOmega;
      const b = Math.sin(t * omega) / sinOmega;
      return v1.clone().multiplyScalar(a).add(v2.clone().multiplyScalar(b));
    }

    /* Build curve that lifts off the sphere — nicer flight path */
    function buildArcPoints(start, end, segments = 64, maxLift = 1.35) {
      const points = [];
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const slerped = slerp(start, end, t);
        // Altitude curve: peaks in middle
        const alt = 1 + (maxLift - 1) * Math.sin(t * Math.PI);
        const onSphere = slerped.normalize().multiplyScalar(RADIUS * alt);
        points.push(onSphere);
      }
      return points;
    }

    function buildRoutesAndMarkers() {
      const originVec = latLngToVec3(ORIGIN.lat, ORIGIN.lng);

      // Origin marker
      const originGroup = new THREE.Group();
      originGroup.position.copy(originVec.clone().normalize().multiplyScalar(RADIUS + 0.5));
      // align Z axis to point outward
      originGroup.lookAt(0, 0, 0);

      const originRingGeo = new THREE.RingGeometry(1.2, 1.6, 32);
      const originRingMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide,
      });
      const originRing = new THREE.Mesh(originRingGeo, originRingMat);
      originGroup.add(originRing);

      const originCoreGeo = new THREE.CircleGeometry(0.6, 16);
      const originCoreMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
      });
      const originCore = new THREE.Mesh(originCoreGeo, originCoreMat);
      originGroup.add(originCore);

      // Pulse ring (animates radius)
      const pulseGeo = new THREE.RingGeometry(1.5, 1.6, 32);
      const pulseMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide,
      });
      const pulse = new THREE.Mesh(pulseGeo, pulseMat);
      originGroup.add(pulse);
      // Animate pulse: start small, grow to large, fade
      const pulseAnim = { t: 0 };
      animatables.push((dt) => {
        pulseAnim.t = (pulseAnim.t + dt * 0.5) % 1;
        const scale = 1 + pulseAnim.t * 5;
        pulse.scale.set(scale, scale, scale);
        pulse.material.opacity = 0.7 * (1 - pulseAnim.t);
      });

      globe.add(originGroup);

      // Destinations + arcs + packets
      const arcMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.45,
      });

      DESTINATIONS.forEach((dest, idx) => {
        const destVec = latLngToVec3(dest.lat, dest.lng);

        // Destination marker
        const destGroup = new THREE.Group();
        destGroup.position.copy(destVec.clone().normalize().multiplyScalar(RADIUS + 0.4));
        destGroup.lookAt(0, 0, 0);

        const destDotGeo = new THREE.CircleGeometry(0.55, 16);
        const destDotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const destDot = new THREE.Mesh(destDotGeo, destDotMat);
        // Larger invisible hit area for raycaster (better hover UX)
        const hitMat = new THREE.MeshBasicMaterial({ visible: false });
        const hitMesh = new THREE.Mesh(new THREE.CircleGeometry(2.2, 16), hitMat);
        hitMesh.userData = {
          isDestNode: true,
          dest,
        };
        destGroup.add(hitMesh);
        destGroup.add(destDot);
        hoverableNodes.push(hitMesh);

        // Subtle ring around destination
        const destRingGeo = new THREE.RingGeometry(0.9, 1.0, 24);
        const destRingMat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.5,
          side: THREE.DoubleSide,
        });
        const destRing = new THREE.Mesh(destRingGeo, destRingMat);
        destGroup.add(destRing);

        globe.add(destGroup);

        // Great circle arc
        const arcPoints = buildArcPoints(originVec, destVec);
        const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPoints);
        const arc = new THREE.Line(arcGeo, arcMat.clone());
        // Start with arc invisible, fade in
        arc.material.opacity = 0;
        globe.add(arc);

        setTimeout(() => {
          // Animate opacity in
          let op = 0;
          const target = 0.4;
          const fadeIn = () => {
            op += 0.02;
            arc.material.opacity = Math.min(op, target);
            if (op < target) requestAnimationFrame(fadeIn);
          };
          fadeIn();
        }, 500 + idx * 180);

        // Packet (red sphere) traveling along arc
        const packetGeo = new THREE.SphereGeometry(0.45, 12, 12);
        const packetMat = new THREE.MeshBasicMaterial({ color: 0xd71921 });
        const packet = new THREE.Mesh(packetGeo, packetMat);
        globe.add(packet);

        // Trail — line of last N positions, vertex-color fade
        const TRAIL_LEN = 22;
        const trailPositions = new Float32Array(TRAIL_LEN * 3);
        const trailColors = new Float32Array(TRAIL_LEN * 3);
        for (let i = 0; i < TRAIL_LEN; i++) {
          // Head bright red, tail dark
          const t = 1 - i / (TRAIL_LEN - 1);
          trailColors[i * 3 + 0] = (0xd7 / 255) * t;
          trailColors[i * 3 + 1] = (0x19 / 255) * t;
          trailColors[i * 3 + 2] = (0x21 / 255) * t;
        }
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
        trailGeo.setAttribute("color", new THREE.BufferAttribute(trailColors, 3));
        const trailMat = new THREE.LineBasicMaterial({
          vertexColors: true,
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const trail = new THREE.Line(trailGeo, trailMat);
        trail.visible = false;
        globe.add(trail);

        const trailHistory = []; // array of Vector3
        const duration = 3.5 + idx * 0.25;
        const startDelay = 1.5 + idx * 0.4;
        const packetState = { t: -startDelay / duration };

        animatables.push((dt) => {
          packetState.t += dt / duration;
          if (packetState.t < 0) {
            packet.visible = false;
            trail.visible = false;
            return;
          }
          packet.visible = true;
          const tWrapped = packetState.t % 1;
          const idx2 = Math.floor(tWrapped * (arcPoints.length - 1));
          const p = arcPoints[idx2];
          packet.position.copy(p);

          // Wrap detection: if t just wrapped from 0.99 to 0.01, clear trail
          if (tWrapped < 0.05 && trailHistory.length > 5) {
            trailHistory.length = 0;
          }

          trailHistory.push(p.clone());
          if (trailHistory.length > TRAIL_LEN) trailHistory.shift();

          // Fill positions: head = current, going back through history
          for (let i = 0; i < TRAIL_LEN; i++) {
            const histIdx = trailHistory.length - 1 - i;
            const v = histIdx >= 0 ? trailHistory[histIdx] : trailHistory[0] || p;
            trailPositions[i * 3 + 0] = v.x;
            trailPositions[i * 3 + 1] = v.y;
            trailPositions[i * 3 + 2] = v.z;
          }
          trailGeo.attributes.position.needsUpdate = true;
          trail.visible = trailHistory.length >= 3;
        });
      });
    }

    /* ─────────────────────────────────────────────
       HOVER NODES — raycaster + tooltip
       ───────────────────────────────────────────── */
    const hoverableNodes = []; // populated in buildRoutesAndMarkers
    const raycaster = new THREE.Raycaster();
    const pointerNDC = new THREE.Vector2();
    const tooltipEl = document.getElementById("tooltip");
    const ttName = document.getElementById("tt-name");
    const ttLat = document.getElementById("tt-lat");
    const ttUp = document.getElementById("tt-up");
    let currentHover = null;
    let pointerScreen = { x: 0, y: 0, active: false };

    function updateHover() {
      if (!pointerScreen.active || isDragging) {
        if (currentHover) {
          tooltipEl.classList.remove("visible");
          currentHover = null;
        }
        return;
      }

      pointerNDC.x = (pointerScreen.x / window.innerWidth) * 2 - 1;
      pointerNDC.y = -(pointerScreen.y / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointerNDC, camera);
      const hits = raycaster.intersectObjects(hoverableNodes, false);

      if (hits.length > 0) {
        const node = hits[0].object;
        const dest = node.userData.dest;

        // Check if node is on near side of globe (not occluded by sphere)
        const worldPos = new THREE.Vector3();
        node.getWorldPosition(worldPos);
        const camToNode = worldPos.clone().sub(camera.position);
        // Sphere center is origin (0,0,0), check if there's a sphere intersection in front of node
        // Simple test: if node's distance to camera > sphere center distance + RADIUS, it's behind
        const camToCenter = new THREE.Vector3().sub(camera.position);
        const nodeProjOnCam = camToNode.dot(camToCenter.normalize());
        const centerProjOnCam = camToCenter.length();
        const nodeBehindSphere = nodeProjOnCam > centerProjOnCam &&
          worldPos.length() > camToCenter.length() - 5;

        if (nodeBehindSphere) {
          if (currentHover) {
            tooltipEl.classList.remove("visible");
            currentHover = null;
          }
          return;
        }

        // Show tooltip
        if (currentHover !== dest) {
          ttName.textContent = dest.name;
          ttLat.textContent = dest.latencyMs + " MS";
          ttUp.textContent = dest.uptime.toFixed(1) + "%";
          currentHover = dest;
        }

        // Position tooltip above the node in screen space
        worldPos.project(camera);
        const screenX = (worldPos.x * 0.5 + 0.5) * window.innerWidth;
        const screenY = (-worldPos.y * 0.5 + 0.5) * window.innerHeight;
        tooltipEl.style.left = screenX + "px";
        tooltipEl.style.top = screenY + "px";
        tooltipEl.classList.add("visible");
      } else {
        if (currentHover) {
          tooltipEl.classList.remove("visible");
          currentHover = null;
        }
      }
    }

    /* ─────────────────────────────────────────────
       INTERACTION — drag to rotate, auto-rotate
       ───────────────────────────────────────────── */
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let velocityY = 0;
    let lastInteract = 0;

    stage.addEventListener("mousedown", (e) => {
      isDragging = true;
      stage.classList.add("dragging");
      prevX = e.clientX;
      prevY = e.clientY;
      lastInteract = performance.now();
    });
    window.addEventListener("mousemove", (e) => {
      pointerScreen.x = e.clientX;
      pointerScreen.y = e.clientY;
      pointerScreen.active = true;

      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      globe.rotation.y += dx * 0.005;
      globe.rotation.x += dy * 0.005;
      // Clamp x rotation
      globe.rotation.x = Math.max(-1.0, Math.min(1.0, globe.rotation.x));
      velocityY = dx * 0.005;
      prevX = e.clientX;
      prevY = e.clientY;
      lastInteract = performance.now();
    });
    window.addEventListener("mouseleave", () => {
      pointerScreen.active = false;
    });
    window.addEventListener("mouseup", () => {
      isDragging = false;
      stage.classList.remove("dragging");
    });

    // Touch support
    stage.addEventListener("touchstart", (e) => {
      if (!e.touches[0]) return;
      isDragging = true;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
      lastInteract = performance.now();
    }, { passive: true });
    window.addEventListener("touchmove", (e) => {
      if (!isDragging || !e.touches[0]) return;
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      globe.rotation.y += dx * 0.005;
      globe.rotation.x += dy * 0.005;
      globe.rotation.x = Math.max(-1.0, Math.min(1.0, globe.rotation.x));
      velocityY = dx * 0.005;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
      lastInteract = performance.now();
    }, { passive: true });
    window.addEventListener("touchend", () => { isDragging = false; });

    /* ─────────────────────────────────────────────
       ANIMATION LOOP
       ───────────────────────────────────────────── */
    const animatables = []; // functions called per frame
    let lastTime = performance.now();

    function animate() {
      const now = performance.now();
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      // Auto rotation when not dragging
      if (!isDragging) {
        // Apply inertia from drag
        if (Math.abs(velocityY) > 0.0005) {
          globe.rotation.y += velocityY;
          velocityY *= 0.94;
        }
        // Constant slow auto rotation
        globe.rotation.y += 0.0006;

        // Slowly bring x rotation back to slight tilt after no interaction
        const idleTime = (now - lastInteract) / 1000;
        if (idleTime > 2) {
          const targetX = -0.25;
          globe.rotation.x += (targetX - globe.rotation.x) * 0.005;
        }
      }

      // Run animatables
      for (const fn of animatables) fn(dt);

      // Hover detection
      updateHover();

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    /* ─────────────────────────────────────────────
       RESIZE
       ───────────────────────────────────────────── */
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ─────────────────────────────────────────────
       BOOT
       ───────────────────────────────────────────── */
    /* Orient globe so a target lat/lng faces camera */
    function setInitialOrientation() {
      const target = latLngToVec3(ORIGIN.lat, ORIGIN.lng);
      // Rotate around Y so target's XZ projection points to +Z (toward camera)
      const phi = Math.atan2(target.z, target.x);
      globe.rotation.y = phi - Math.PI / 2;
      // Slight downward tilt so northern hemisphere is up-and-forward
      globe.rotation.x = -0.25;
    }

    function boot() {
      const t0 = performance.now();
      buildLandPolygons();
      const t1 = performance.now();
      console.log(`[PRSLOY] polygons built in ${(t1 - t0).toFixed(0)}ms`);

      buildDots();
      const t2 = performance.now();
      console.log(`[PRSLOY] dots built in ${(t2 - t1).toFixed(0)}ms`);

      buildRoutesAndMarkers();
      setInitialOrientation();

      loadingEl.style.display = "none";
      animate();
    }

    // Defer to next frame so loading text shows
    requestAnimationFrame(() => requestAnimationFrame(boot));
  </script>
</body>
</html>
