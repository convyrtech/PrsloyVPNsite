<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRSLOY · Glass Shatter · NOTHING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --black: #000;
      --surface: #111;
      --border: #222;
      --border-visible: #333;
      --text-disabled: #666;
      --text-secondary: #999;
      --text-primary: #e8e8e8;
      --text-display: #fff;
      --accent: #d71921;
      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-shatter: cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text-primary);
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 300;
      overflow: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom cursor — small crosshair */
    .custom-cursor {
      position: fixed;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      transition: transform 60ms linear;
    }
    .custom-cursor::before, .custom-cursor::after {
      content: "";
      position: absolute;
      background: var(--text-display);
      opacity: 0.7;
    }
    .custom-cursor::before {
      width: 1px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }
    .custom-cursor::after {
      width: 100%;
      height: 1px;
      top: 50%;
      transform: translateY(-50%);
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .label {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-disabled);
      margin-bottom: 32px;
    }

    .yoursees {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 300;
      font-size: clamp(28px, 5vw, 56px);
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 16px;
    }

    /* NOTHING container — letters animate independently */
    .nothing-wrap {
      display: flex;
      gap: 0.18em;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 400;
      font-size: clamp(72px, 13vw, 168px);
      letter-spacing: -0.01em;
      color: var(--text-display);
      line-height: 1;
      position: relative;
      cursor: pointer;
      pointer-events: auto;
      user-select: none;
    }

    .letter {
      display: inline-block;
      transform-origin: center center;
      transition:
        transform 1100ms var(--ease-shatter),
        opacity 800ms var(--ease-out),
        filter 800ms var(--ease-out);
      will-change: transform, opacity, filter;
    }

    /* Crack overlay */
    .crack-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .crack {
      fill: none;
      stroke: var(--text-display);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-opacity: 0;
    }

    .crack.active {
      stroke-opacity: 0.9;
      transition: stroke-opacity 80ms linear;
    }

    /* Shard polygons */
    .shard {
      fill: var(--text-display);
      fill-opacity: 0;
      transform-origin: center center;
      transform-box: fill-box;
      transition:
        transform 1200ms var(--ease-shatter),
        fill-opacity 600ms var(--ease-out);
    }

    .shard.flying {
      fill-opacity: 0.9;
    }

    /* Impact ring (the "hit" point) */
    .impact-ring {
      fill: none;
      stroke: var(--text-display);
      stroke-width: 1;
      stroke-opacity: 0;
      transform-origin: center center;
      transform-box: fill-box;
    }

    .impact-ring.active {
      animation: impact 600ms var(--ease-out) forwards;
    }

    @keyframes impact {
      0% {
        stroke-opacity: 1;
        stroke-width: 2;
        transform: scale(0);
      }
      100% {
        stroke-opacity: 0;
        stroke-width: 0.5;
        transform: scale(8);
      }
    }

    /* Hint */
    .hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-disabled);
      pointer-events: none;
      animation: hint-pulse 2s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.85; }
    }

    /* Reset button */
    .reset {
      position: fixed;
      top: 40px;
      right: 40px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-visible);
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 200ms var(--ease-out);
      z-index: 100;
    }

    .reset:hover {
      color: var(--text-display);
      border-color: var(--text-secondary);
    }

    .signature {
      position: fixed;
      top: 40px;
      left: 40px;
      font-family: "Doto", monospace;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: var(--text-display);
      opacity: 0.7;
    }

    .meta {
      position: fixed;
      bottom: 40px;
      left: 40px;
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-disabled);
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .signature, .reset { top: 16px; }
      .signature { left: 16px; }
      .reset { right: 16px; padding: 8px 14px; font-size: 10px; }
      .meta, .hint { left: 16px; bottom: 16px; }
      .hint { left: 50%; bottom: 16px; }
    }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>

  <div class="signature">PRSLOY</div>
  <button class="reset" id="reset">[ RESET ]</button>

  <div class="stage">
    <div class="label">DOUBLE-HOP ENCRYPTION</div>
    <div class="yoursees">YOUR ISP SEES</div>

    <div class="nothing-wrap" id="nothing">
      <span class="letter" data-i="0">N</span>
      <span class="letter" data-i="1">O</span>
      <span class="letter" data-i="2">T</span>
      <span class="letter" data-i="3">H</span>
      <span class="letter" data-i="4">I</span>
      <span class="letter" data-i="5">N</span>
      <span class="letter" data-i="6">G</span>

      <svg class="crack-svg" id="crack-svg" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div class="meta">
    YOUR DATA. INVISIBLE.<br />
    RU WHITELIST → GLOBAL EXIT
  </div>

  <div class="hint">CLICK NOTHING ↑</div>

  <script>
    const nothingEl = document.getElementById("nothing");
    const crackSvg = document.getElementById("crack-svg");
    const resetBtn = document.getElementById("reset");
    const letters = nothingEl.querySelectorAll(".letter");
    const cursor = document.getElementById("cursor");

    let shattered = false;

    /* Custom cursor follow */
    document.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });

    /* ─────────────────────────────────────────────
       SHATTER
       ───────────────────────────────────────────── */
    function shatter(impactX, impactY) {
      if (shattered) return;
      shattered = true;

      const rect = nothingEl.getBoundingClientRect();
      const localX = impactX - rect.left;
      const localY = impactY - rect.top;
      const w = rect.width;
      const h = rect.height;

      // Set svg to cover the nothing-wrap
      crackSvg.setAttribute("viewBox", `0 0 ${w} ${h}`);
      crackSvg.style.position = "absolute";
      crackSvg.style.left = "0";
      crackSvg.style.top = "0";
      crackSvg.style.width = w + "px";
      crackSvg.style.height = h + "px";

      // Generate radial cracks from impact
      const cracksToMake = 7;
      const crackElements = [];
      for (let i = 0; i < cracksToMake; i++) {
        const angle = (Math.PI * 2 * i) / cracksToMake + (Math.random() - 0.5) * 0.4;
        const length = w * (0.5 + Math.random() * 0.45);
        const segments = 4 + Math.floor(Math.random() * 3);
        let pathD = `M ${localX} ${localY}`;
        let curX = localX;
        let curY = localY;
        for (let s = 0; s < segments; s++) {
          const segLen = length / segments;
          const angleJitter = (Math.random() - 0.5) * 0.6;
          const segAngle = angle + angleJitter;
          curX += Math.cos(segAngle) * segLen;
          curY += Math.sin(segAngle) * segLen;
          pathD += ` L ${curX.toFixed(1)} ${curY.toFixed(1)}`;
        }
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pathD);
        path.setAttribute("class", "crack");
        path.style.strokeWidth = (1.5 - Math.random() * 0.7).toFixed(2);
        crackSvg.appendChild(path);
        crackElements.push(path);
      }

      // Add some secondary fine cracks
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const startDist = 30 + Math.random() * 40;
        const startX = localX + Math.cos(angle) * startDist;
        const startY = localY + Math.sin(angle) * startDist;
        const endAngle = angle + (Math.random() - 0.5) * 1.0;
        const endLen = 30 + Math.random() * 80;
        const endX = startX + Math.cos(endAngle) * endLen;
        const endY = startY + Math.sin(endAngle) * endLen;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${startX.toFixed(1)} ${startY.toFixed(1)} L ${endX.toFixed(1)} ${endY.toFixed(1)}`);
        path.setAttribute("class", "crack");
        path.style.strokeWidth = "0.5";
        path.style.strokeOpacity = "0";
        crackSvg.appendChild(path);
        crackElements.push(path);
      }

      // Impact ring
      const impactRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      impactRing.setAttribute("cx", localX);
      impactRing.setAttribute("cy", localY);
      impactRing.setAttribute("r", 8);
      impactRing.setAttribute("class", "impact-ring");
      crackSvg.appendChild(impactRing);

      // Phase 1: cracks appear (instant flash)
      requestAnimationFrame(() => {
        impactRing.classList.add("active");
        // Cracks appear with stagger
        crackElements.forEach((c, i) => {
          setTimeout(() => {
            c.classList.add("active");
            c.style.strokeOpacity = (0.4 + Math.random() * 0.5).toFixed(2);
          }, 30 + i * 25);
        });
      });

      // Phase 2: letters shift slightly (settling cracks)
      setTimeout(() => {
        letters.forEach((l, i) => {
          const dx = (Math.random() - 0.5) * 6;
          const dy = (Math.random() - 0.5) * 4;
          const rot = (Math.random() - 0.5) * 4;
          l.style.transition = "transform 300ms var(--ease-out)";
          l.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
        });
      }, 200);

      // Phase 3: full shatter — letters fly outward
      setTimeout(() => {
        const centerX = w / 2;
        const centerY = h / 2;

        letters.forEach((l, i) => {
          const lRect = l.getBoundingClientRect();
          const lCenterX = lRect.left - rect.left + lRect.width / 2;
          const lCenterY = lRect.top - rect.top + lRect.height / 2;

          // Direction from impact to letter center
          let vx = lCenterX - localX;
          let vy = lCenterY - localY;
          const len = Math.sqrt(vx * vx + vy * vy) || 1;
          vx /= len;
          vy /= len;

          // Distance to fly: scales with bigger letter pieces
          const dist = 250 + Math.random() * 350;
          const dx = vx * dist + (Math.random() - 0.5) * 100;
          const dy = vy * dist + (Math.random() - 0.5) * 60 + 100; // slight gravity
          const rot = (Math.random() - 0.5) * 90;
          const scale = 0.4 + Math.random() * 0.4;

          l.style.transition =
            "transform 1400ms var(--ease-shatter), opacity 1100ms var(--ease-out), filter 1100ms var(--ease-out)";
          l.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(${scale})`;
          l.style.opacity = "0";
          l.style.filter = "blur(2px)";
        });

        // Cracks fade out as letters fly
        setTimeout(() => {
          crackElements.forEach((c, i) => {
            c.style.transition = "stroke-opacity 800ms var(--ease-out)";
            c.style.strokeOpacity = "0";
          });
        }, 400);
      }, 550);
    }

    nothingEl.addEventListener("click", (e) => {
      shatter(e.clientX, e.clientY);
    });

    /* ─────────────────────────────────────────────
       RESET
       ───────────────────────────────────────────── */
    resetBtn.addEventListener("click", () => {
      shattered = false;
      // Clear cracks
      while (crackSvg.firstChild) crackSvg.removeChild(crackSvg.firstChild);
      // Reset letters
      letters.forEach((l) => {
        l.style.transition = "transform 600ms var(--ease-out), opacity 400ms var(--ease-out), filter 400ms var(--ease-out)";
        l.style.transform = "";
        l.style.opacity = "1";
        l.style.filter = "";
      });
    });
  </script>
</body>
</html>
